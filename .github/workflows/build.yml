name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug

    - name: Get current date
      id: date
      run: echo "DATE=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.date.outputs.DATE }}
        name: Re-KeyboardGPT v2.0.1-dev (${{ steps.date.outputs.DATE }})
        body: |
          # Re-KeyboardGPT v2.0.1-dev

          [![Build Status](https://img.shields.io/github/actions/workflow/status/DominatorStufs/Re-KeyboardGPT/build.yml?style=flat-square)](https://github.com/DominatorStufs/Re-KeyboardGPT/actions)
          [![Platform](https://img.shields.io/badge/Platform-Android-3DDC84?style=flat-square&logo=android&logoColor=white)](https://developer.android.com)

          ---

          ## ✨ What's New in This Fork
          - ✅ **CodexAPI** — Free AI, no API key needed  
          - ✅ **35+ Models** — GPT-5, Grok-4, DeepSeek, Gemini, Claude & more  
          - ✅ `%tr <text>%` — Translate any language to English  
          - ✅ `%?%` — Show all commands popup  

          ---

          ## 📦 How to Install
          1. Download APK below  
          2. Enable in **LSPosed** and select your keyboard  
          3. Restart your device  

          ---

          ## ⚡ Commands

          | Command | Description |
          |--------|------------|
          | `$$` | Configure AI model |
          | `$<prompt>$` | Send AI prompt |
          | `%tr <text>%` | Translate to English |
          | `%s <text>%` | Web search |
          | `%?%` | Show help |
          | `\|text\|` | Italic |
          | `@text@` | Bold |
          | `~text~` | Strikethrough |
          | `_text_` | Underline |

          ---

          > 🔗 Original project: https://github.com/Mino260806/KeyboardGPT  

        files: app/build/outputs/apk/debug/*.apk

      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
