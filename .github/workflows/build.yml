name: Build and Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/daemon
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        cache-read-only: false

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Extract version name
      id: version
      run: |
        VERSION=$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle || echo "2.0")
        echo "VERSION_NAME=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Rename APK
      run: |
        APK_FILE=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
        mv "$APK_FILE" "app/build/outputs/apk/debug/Re-KeyboardGPT-v${{ steps.version.outputs.VERSION_NAME }}.apk"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Re-KeyboardGPT-v${{ steps.version.outputs.VERSION_NAME }}
        path: app/build/outputs/apk/debug/Re-KeyboardGPT-v${{ steps.version.outputs.VERSION_NAME }}.apk

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION_NAME }}
        name: Re-KeyboardGPT v${{ steps.version.outputs.VERSION_NAME }}
        body: |
          # Re-KeyboardGPT v${{ steps.version.outputs.VERSION_NAME }}

          [

![Build Status](https://img.shields.io/github/actions/workflow/status/DominatorStufs/Re-KeyboardGPT/build.yml?style=flat-square)

](https://github.com/DominatorStufs/Re-KeyboardGPT/actions)
          [

![Platform](https://img.shields.io/badge/Platform-Android-3DDC84?style=flat-square&logo=android&logoColor=white)

](https://developer.android.com)

          ---

          ### What's New in This Fork
          - ✅ **CodexAPI** — Free AI, no API key needed!
          - ✅ **35+ Models** — GPT-5, Grok-4, DeepSeek, Gemini, Claude & more
          - ✅ `%tr <text>%` — Translate any language to English
          - ✅ `%?%` — Show all commands popup

          ---

          ### How to Install
          1. Download APK below
          2. Enable in **LSPosed** and select your keyboard
          3. Restart phone

          ---

          ### Commands
          | Command | Description |
          |---|---|
          | `$$` | Configure AI model |
          | `$<prompt>$` | Send AI prompt |
          | `%tr <text>%` | Translate to English |
          | `%s <text>%` | Web search |
          | `%?%` | Show help |
          | `\|text\|` | Italic |
          | `@text@` | Bold |
          | `~text~` | Strikethrough |
          | `_text_` | Underline |

          ---

          > Original project: [KeyboardGPT](https://github.com/Mino260806/KeyboardGPT) by Mino260806
        draft: false
        prerelease: false
        files: |
          app/build/outputs/apk/debug/Re-KeyboardGPT-v${{ steps.version.outputs.VERSION_NAME }}.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 
